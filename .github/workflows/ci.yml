name: CI - MLflow Retraining and Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: model-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: MLProject/requirements.txt

      - name: Validate required Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || (echo "::error::DOCKERHUB_USERNAME is not configured" && exit 1)
          test -n "$DOCKERHUB_TOKEN" || (echo "::error::DOCKERHUB_TOKEN is not configured" && exit 1)

      - name: Install reproducible dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r MLProject/requirements.txt

      - name: Train through the MLflow Project
        id: train
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local \
            -P data_path=telco_customer_churn_preprocessing \
            -P run_id_output=run_id.txt
          test -s run_id.txt
          RUN_ID="$(tr -d '\r\n' < run_id.txt)"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Model trained successfully. Run ID: $RUN_ID"

      - name: Upload MLflow run artifact
        uses: actions/upload-artifact@v6
        with:
          name: telco-churn-mlflow-${{ github.sha }}
          path: |
            MLProject/mlruns/
            MLProject/run_id.txt
          retention-days: 90
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build immutable model image with MLflow
        working-directory: MLProject
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          RUN_ID: ${{ steps.train.outputs.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          IMAGE_SHA="${DOCKERHUB_USERNAME}/telco-churn-model:${COMMIT_SHA}"
          mlflow models build-docker \
            --model-uri "runs:/${RUN_ID}/model" \
            --name "$IMAGE_SHA" \
            --env-manager local
          docker tag "$IMAGE_SHA" "${DOCKERHUB_USERNAME}/telco-churn-model:latest"

      - name: Smoke-test model image
        working-directory: MLProject
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          IMAGE_SHA="${DOCKERHUB_USERNAME}/telco-churn-model:${COMMIT_SHA}"
          docker run --detach --name telco-churn-smoke --publish 5001:8080 "$IMAGE_SHA"
          python smoke_test.py --url http://localhost:5001 --timeout 120

      - name: Remove smoke-test container
        if: always()
        run: docker rm --force telco-churn-smoke 2>/dev/null || true

      - name: Push immutable and latest model images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          docker push "${DOCKERHUB_USERNAME}/telco-churn-model:${COMMIT_SHA}"
          docker push "${DOCKERHUB_USERNAME}/telco-churn-model:latest"
